services:
  postgres:
    image: postgres:16-alpine
    container_name: padel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-padel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-padel}
      POSTGRES_DB: ${POSTGRES_DB:-padel_tournament}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel"]
      interval: 5s
      timeout: 5s
      retries: 5

  media:
    image: bluenviron/mediamtx:latest
    container_name: padel-media
    ports:
      - "1935:1935"   # RTMP input (OBS)
      - "8888:8888"   # HLS output (browser)
      - "8554:8554"   # RTSP (optional)
    volumes:
      - ./services/media/mediamtx.yml:/mediamtx.yml

volumes:
  pgdata:
